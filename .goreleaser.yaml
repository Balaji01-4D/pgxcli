# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

# Keep GoReleaser internal dist separate from CI-downloaded artifacts in ./dist.
dist: .goreleaser-dist

# Centralized final-release config: build artifacts are produced in platform jobs.
builds:
  - id: skip
    skip: true

release:
  name_template: "The Codename Release"
  mode: keep-existing
  replace_existing_artifacts: true
  prerelease: auto
  make_latest: true
  header: |-
    ## [{{ .Tag }}] - {{ .Date }}

    ### Added
    - [Placeholder]

    ### Changed
    - [Placeholder]

    ### Fixed
    - [Placeholder]
  extra_files:
    - glob: dist/**/*.zip
    - glob: dist/**/*.tar.gz
    - glob: dist/**/*.deb
    - glob: dist/**/*.rpm
    - glob: dist/**/*.apk
    - glob: dist/**/*.pkg.tar.zst
    - glob: dist/**/*.nupkg

changelog:
  disable: true

checksum:
  name_template: "checksums.txt"
